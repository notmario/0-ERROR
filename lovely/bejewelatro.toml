pattern = '''config = {align="bm", offset = {x=0,y=0.3},major = G.hand, bond = 'Weak'}'''
payload = """
config = {align="bm", offset = {x=Bejewelatro.board_visible and 6.35 or 0,y=Bejewelatro.board_visible and -3.2 or 0.3},major = G.hand, bond = 'Weak'}
